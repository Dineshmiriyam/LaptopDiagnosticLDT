; Laptop Diagnostic Toolkit - Configuration
; Version: 7.0.0
; Last Updated: 2026-02-21

[General]
Version=7.1.0
ToolName=Laptop Diagnostic Toolkit
Edition=Department-Wide Standard
ScriptFile=Laptop_Diagnostic_Suite.ps1
LauncherFile=Laptop_Master_Diagnostic.bat

[Paths]
; All paths relative to USB drive root
LogsDir=Logs
ReportsDir=Reports
ConfigDir=Config
TempDir=Temp
ResultsDir=Results
ToolsDir=Tools
DriversDir=Drivers
BackupsDir=Backups
DataDir=Data
ArchiveDir=Archive
DocsDir=Docs

[Diagnostics]
MaxEventLogEntries=500
EventLogDaysBack=7
BSODDaysBack=30
ReliabilityDaysBack=30

[HardwareTests]
DiskTestSizeMB=100
DiskTestMinFreeSpaceMB=200
MemoryTestSizeMB=100
MemoryTestBlockCount=100
MemoryTestBlockSizeMB=1
CPUStressTestDurationSec=10
ThermalMonitorDurationSec=30
ThermalSampleIntervalSec=5
ThermalWarningThresholdC=75
ThermalCriticalThresholdC=85
CPUTempMinValid=0
CPUTempMaxValid=120
CPUTempRawMinValid=0
CPUTempRawMaxValid=5000

[PerformanceBenchmark]
CPUBenchmarkDurationSec=5
DiskBenchmarkSizeMB=50
MemoryBenchmarkSizeMB=50

[Repair]
CreateRestorePointBeforeRepair=true
BackupBeforeRepair=true
AutomaticallyFixDrivers=false

[Fleet]
FleetModeEnabled=false
FleetCSVExport=true
FleetHTMLExport=true
AggregateResultsDir=Results

[Reporting]
ReportFormat=HTML
ReportColor=#00539B
IncludeSystemInformation=true
IncludeHardwareDetails=true
IncludeSoftwareDetails=true
OpenReportAfterGeneration=true

[Security]
DefenderSignatureMaxAgeDays=7
RequireTPM=false
RequireBitLocker=false
RequireSecureBoot=false

[PowerManagement]
MinBatteryForBIOSUpdate=20
RequireACPowerForBIOSUpdate=true

[DataCollection]
SkipBackup=1
LimitedCollection=1
CollectSystemInfo=1
CollectHardwareInfo=1
CollectErrorLogs=1
CollectUserData=0
CollectNetworkInfo=0

[Refurbishment]
; Battery thresholds
CycleCountGreen=500
CycleCountYellow=800
WearPercentGreen=20
WearPercentYellow=35
MinimumBatteryScore=75
; Thermal thresholds
StressDurationSec=300
StressSampleIntervalSec=5
ThermalPassMaxC=75
ThermalWarnMaxC=85
; Quality check
MinimumPassRate=80

[AutoRemediation]
; Master switch (0=disabled, 1=enabled)
AutoRemediationEnabled=1
; Create restore point before system fixes
CreateRestorePointBeforeFix=true
; DNS servers to set when DNS is broken
FallbackDNSPrimary=8.8.8.8
FallbackDNSSecondary=1.1.1.1
; Temp cleanup threshold (MB)
TempCleanupThresholdMB=500
; Days since last Windows Update before flagging
WindowsUpdateMaxAgeDays=30
; Defender signature max age before forcing update
DefenderSignatureMaxAgeDays=7
; Lenovo Thin Installer path (relative to USB root)
LenovoThinInstallerPath=Tools\LenovoThinInstaller
; VPN installer path (relative to USB root)
VPNInstallerPath=Tools\VPNInstaller
; Driver update source: WindowsUpdate, LenovoThinInstaller, Both
DriverUpdateSource=Both
; Never auto-update these categories (comma-separated): GPU,BIOS,Firmware
NeverAutoUpdate=BIOS,Firmware

[POSTErrorReader]
; POST/BIOS error code scanning
POSTEventLogDaysBack=90
BIOSAgeWarningYears=3

[SMARTDiskAnalysis]
; SMART attribute thresholds
SMARTReadErrorWarn=1
SMARTReadErrorFail=10
SMARTUncorrectableErrorFail=1
SMARTTemperatureWarnC=55
SMARTTemperatureCritC=65
SMARTWearWarnPercent=70
SMARTWearFailPercent=90
SMARTPowerOnHoursWarnDays=1825
DiskFreeSpaceWarnPercent=20
DiskFreeSpaceFailPercent=10

[CMOSBatteryCheck]
; CMOS/RTC coin cell failure detection
ClockDriftWarnSec=120
ClockDriftFailSec=3600
NTPServer=time.windows.com
CMOSEventLogDaysBack=180

[MachineIdentityCheck]
; Fleet identity validation
RequireSerialNumber=true
RequireUUID=true
RequireAssetTag=false

[TPMHealthCheck]
; TPM health and vulnerability checking
RequireTPM20=true
TPMEventLogDaysBack=90
CheckROCAVulnerability=true

[Win11ReadinessCheck]
; Windows 11 compatibility thresholds
Win11MinRAMGB=4
Win11MinStorageGB=64
Win10EOLDate=2025-10-14

[LenovoVantageCheck]
; Lenovo software stack detection
CheckCommercialVantage=true
CheckSystemUpdate=true
CheckThinInstaller=true

[MemoryErrorLogCheck]
; Memory error cross-reference
WHEAEventLogDaysBack=90
WMDEventLogDaysBack=90

[DisplayPixelCheck]
; Display health and pixel policy
PixelDefectPolicyMaxDead=3
GPUDriverMaxAgeDays=365

[EnterpriseReadinessReport]
; Master health scorecard weights (total=100)
WeightSecurity=20
WeightHardware=15
WeightStorage=15
WeightBattery=10
WeightDrivers=10
WeightOS=10
WeightIdentity=10
WeightTPM=5
WeightDisplay=5
PassingScoreThreshold=70
WarningScoreThreshold=50

[LDT]
; Build metadata
Version=7.1.0
BuildDate=2026-02-20
MinPSVersion=5.1
Edition=Department-Wide Standard

[QuickStart]
; Score This Machine weights (total=100)
WeightHardware=30
WeightSecurity=25
WeightStability=25
WeightPerformance=20
; Grade thresholds (score >= threshold for that grade)
GradeA=90
GradeB=80
GradeC=70
GradeD=60

[SmartDiagnosis]
; Smart Diagnosis Engine (Option 54) configuration
; Stress test settings
StressTestDurationSec=60
StressTestMemoryBlocksMB=200
StressTestDiskSizeMB=100
; Confidence threshold (0-100): auto-fix only if confidence >= this
ConfidenceThresholdForAutoFix=60
; Max escalation level for auto-remediation (L1=OS, L2=Firmware, L3=Hardware)
MaxAutoRemediationLevel=L1
; Rollback protection
BackupRegistryBeforeFix=1
BackupDriversBeforeFix=1
CreateRestorePointBeforeFix=1
; Thermal thresholds for stress test gating
ThermalBlockStressTestC=85
ThermalWarningC=75
; BSOD thresholds
BSODCriticalCount=5
BSODDaysBack=30
; Performance comparison tolerance (% difference from baseline)
PerfTolerancePercent=10
; Event log scan window
EventLogDaysBack=7
; Battery discharge monitoring
BatteryDischargeSampleSec=60

[Display]
; Display Engine configuration (Phase 4K-4N + Phase 7 GPU stress)
; GPU stress test duration in seconds
GPUStressDurationSeconds=15
; Max thermal delta allowed during GPU stress (Celsius)
GPUStressMaxTempDelta=20
; Refresh rate anomaly thresholds
MinRefreshRateHz=50
MaxRefreshRateHz=240
; GPU driver age threshold (days)
GPUDriverMaxAgeDays=365
; Minimum acceptable brightness percentage
BrightnessMinPercent=10
; EDID native resolution validation
EDIDValidation=1

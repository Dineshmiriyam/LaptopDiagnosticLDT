; Laptop Diagnostic Toolkit - Configuration
; Version: 7.0.0
; Last Updated: 2026-02-21

[General]
Version=9.0.0
ToolName=Laptop Diagnostic Toolkit
Edition=Department-Wide Standard
ScriptFile=Laptop_Diagnostic_Suite.ps1
LauncherFile=Laptop_Master_Diagnostic.bat

[Paths]
; All paths relative to USB drive root
LogsDir=Logs
ReportsDir=Reports
ConfigDir=Config
TempDir=Temp
ResultsDir=Results
ToolsDir=Tools
DriversDir=Drivers
BackupsDir=Backups
DataDir=Data
ArchiveDir=Archive
DocsDir=Docs

[Diagnostics]
MaxEventLogEntries=500
EventLogDaysBack=7
BSODDaysBack=30
ReliabilityDaysBack=30

[HardwareTests]
DiskTestSizeMB=100
DiskTestMinFreeSpaceMB=200
MemoryTestSizeMB=100
MemoryTestBlockCount=100
MemoryTestBlockSizeMB=1
CPUStressTestDurationSec=10
ThermalMonitorDurationSec=30
ThermalSampleIntervalSec=5
ThermalWarningThresholdC=75
ThermalCriticalThresholdC=85
CPUTempMinValid=0
CPUTempMaxValid=120
CPUTempRawMinValid=0
CPUTempRawMaxValid=5000

[PerformanceBenchmark]
CPUBenchmarkDurationSec=5
DiskBenchmarkSizeMB=50
MemoryBenchmarkSizeMB=50

[Repair]
CreateRestorePointBeforeRepair=true
BackupBeforeRepair=true
AutomaticallyFixDrivers=false

[Fleet]
FleetModeEnabled=false
FleetCSVExport=true
FleetHTMLExport=true
AggregateResultsDir=Results

[Reporting]
ReportFormat=HTML
ReportColor=#00539B
IncludeSystemInformation=true
IncludeHardwareDetails=true
IncludeSoftwareDetails=true
OpenReportAfterGeneration=true

[Security]
DefenderSignatureMaxAgeDays=7
RequireTPM=false
RequireBitLocker=false
RequireSecureBoot=false

[PowerManagement]
MinBatteryForBIOSUpdate=20
RequireACPowerForBIOSUpdate=true

[DataCollection]
SkipBackup=1
LimitedCollection=1
CollectSystemInfo=1
CollectHardwareInfo=1
CollectErrorLogs=1
CollectUserData=0
CollectNetworkInfo=0

[Refurbishment]
; Battery thresholds
CycleCountGreen=500
CycleCountYellow=800
WearPercentGreen=20
WearPercentYellow=35
MinimumBatteryScore=75
; Thermal thresholds
StressDurationSec=300
StressSampleIntervalSec=5
ThermalPassMaxC=75
ThermalWarnMaxC=85
; Quality check
MinimumPassRate=80

[AutoRemediation]
; Master switch (0=disabled, 1=enabled)
AutoRemediationEnabled=1
; Create restore point before system fixes
CreateRestorePointBeforeFix=true
; DNS servers to set when DNS is broken
FallbackDNSPrimary=8.8.8.8
FallbackDNSSecondary=1.1.1.1
; Temp cleanup threshold (MB)
TempCleanupThresholdMB=500
; Days since last Windows Update before flagging
WindowsUpdateMaxAgeDays=30
; Defender signature max age before forcing update
DefenderSignatureMaxAgeDays=7
; Lenovo Thin Installer path (relative to USB root)
LenovoThinInstallerPath=Tools\LenovoThinInstaller
; VPN installer path (relative to USB root)
VPNInstallerPath=Tools\VPNInstaller
; Driver update source: WindowsUpdate, LenovoThinInstaller, Both
DriverUpdateSource=Both
; Never auto-update these categories (comma-separated): GPU,BIOS,Firmware
NeverAutoUpdate=BIOS,Firmware

[POSTErrorReader]
; POST/BIOS error code scanning
POSTEventLogDaysBack=90
BIOSAgeWarningYears=3

[SMARTDiskAnalysis]
; SMART attribute thresholds
SMARTReadErrorWarn=1
SMARTReadErrorFail=10
SMARTUncorrectableErrorFail=1
SMARTTemperatureWarnC=55
SMARTTemperatureCritC=65
SMARTWearWarnPercent=70
SMARTWearFailPercent=90
SMARTPowerOnHoursWarnDays=1825
DiskFreeSpaceWarnPercent=20
DiskFreeSpaceFailPercent=10

[CMOSBatteryCheck]
; CMOS/RTC coin cell failure detection
ClockDriftWarnSec=120
ClockDriftFailSec=3600
NTPServer=time.windows.com
CMOSEventLogDaysBack=180

[MachineIdentityCheck]
; Fleet identity validation
RequireSerialNumber=true
RequireUUID=true
RequireAssetTag=false

[TPMHealthCheck]
; TPM health and vulnerability checking
RequireTPM20=true
TPMEventLogDaysBack=90
CheckROCAVulnerability=true

[Win11ReadinessCheck]
; Windows 11 compatibility thresholds
Win11MinRAMGB=4
Win11MinStorageGB=64
Win10EOLDate=2025-10-14

[LenovoVantageCheck]
; Lenovo software stack detection
CheckCommercialVantage=true
CheckSystemUpdate=true
CheckThinInstaller=true

[MemoryErrorLogCheck]
; Memory error cross-reference
WHEAEventLogDaysBack=90
WMDEventLogDaysBack=90

[DisplayPixelCheck]
; Display health and pixel policy
PixelDefectPolicyMaxDead=3
GPUDriverMaxAgeDays=365

[EnterpriseReadinessReport]
; Master health scorecard weights (total=100)
WeightSecurity=20
WeightHardware=15
WeightStorage=15
WeightBattery=10
WeightDrivers=10
WeightOS=10
WeightIdentity=10
WeightTPM=5
WeightDisplay=5
PassingScoreThreshold=70
WarningScoreThreshold=50

[LDT]
; Build metadata
Version=9.0.0
BuildDate=2026-02-20
MinPSVersion=5.1
Edition=Department-Wide Standard

[QuickStart]
; Score This Machine weights (total=100)
WeightHardware=30
WeightSecurity=25
WeightStability=25
WeightPerformance=20
; Grade thresholds (score >= threshold for that grade)
GradeA=90
GradeB=80
GradeC=70
GradeD=60

[SmartDiagnosis]
; Smart Diagnosis Engine (Option 54) configuration
; Stress test settings
StressTestDurationSec=60
StressTestMemoryBlocksMB=200
StressTestDiskSizeMB=100
; Confidence threshold (0-100): auto-fix only if confidence >= this
ConfidenceThresholdForAutoFix=60
; Max escalation level for auto-remediation (L1=OS, L2=Firmware, L3=Hardware)
MaxAutoRemediationLevel=L1
; Rollback protection
BackupRegistryBeforeFix=1
BackupDriversBeforeFix=1
CreateRestorePointBeforeFix=1
; Thermal thresholds for stress test gating
ThermalBlockStressTestC=85
ThermalWarningC=75
; BSOD thresholds
BSODCriticalCount=5
BSODDaysBack=30
; Performance comparison tolerance (% difference from baseline)
PerfTolerancePercent=10
; Event log scan window
EventLogDaysBack=7
; Battery discharge monitoring
BatteryDischargeSampleSec=60

[Display]
; Display Engine configuration (Phase 4K-4N + Phase 7 GPU stress)
; GPU stress test duration in seconds
GPUStressDurationSeconds=15
; Max thermal delta allowed during GPU stress (Celsius)
GPUStressMaxTempDelta=20
; Refresh rate anomaly thresholds
MinRefreshRateHz=50
MaxRefreshRateHz=240
; GPU driver age threshold (days)
GPUDriverMaxAgeDays=365
; Minimum acceptable brightness percentage
BrightnessMinPercent=10
; EDID native resolution validation
EDIDValidation=1

[ClassificationEngine]
; === 3-Level Diagnostic Classification Engine ===
; Severity score thresholds (0-100, higher = more critical)
SeverityCritical=90
SeverityHigh=65
SeverityMedium=40
SeverityLow=20

; L3 triggers (any match = immediate L3, no auto-fix attempted)
L3_WHEAUncorrectable=1
L3_StorageControllerFault=1
L3_BIOSCorruption=1
L3_TPMNotDetected=1
L3_SMARTFailure=1
L3_PostFailure=1

; L2 thresholds (replaceable component wear)
L2_BatteryWearPercent=40
L2_BatteryWearCriticalPercent=60
L2_SSDWearPercent=70
L2_NVMeWearPercent=80
L2_NVMeWearCriticalPercent=90
L2_RAMErrorCount=1
L2_CMOSClockDriftSec=120
L2_DisplayDeadPixels=3
L2_PowerOnHoursWarnDays=1825

; L1 auto-fix scope
L1_AutoFixCategories=OS/Boot,Driver,Security,Network,Performance,Storage
L1_MaxAutoFixAttempts=3
L1_RequireConfidenceForFix=60

; L2 to L3 escalation triggers
EscalateL2ToL3_UncorrectableMemory=1
EscalateL2ToL3_StorageControllerFail=1
EscalateL2ToL3_FirmwareCorruption=1
EscalateL2ToL3_TPMHardwareFail=1

; Report settings
IncludeDecisionTreePath=1
IncludeComponentHealthCards=1

[RemediationLedger]
; Structured per-fix audit trail
Enabled=1
MaxEntriesPerSession=50
IncludeBeforeAfterState=1
RequireStressValidation=1

[PhaseTiming]
; Per-phase performance instrumentation
Enabled=1
LogToConsole=1
SlowPhaseThresholdSec=120

[ManagementSummary]
; Executive summary artifact
Enabled=1
IncludeRiskReduction=1
IncludeTrend=1
MaxFindingsToShow=10

[EnterpriseHardening]
; Hardening controls
IntegrityCheckBeforeRemediation=1
DeduplicateFixes=1
RequireBackupVerification=1
StressOverrideClassification=1

[GovernanceEngine]
; v9 Enterprise Governance Engine
Enabled=1
DefaultPolicyProfile=Balanced
ExecutionMode=Full
TransactionCheckpointEnabled=1
ExecutionStateMaxAgeHours=24

[ExceptionGovernance]
; Structured exception management
Enabled=1
ExceptionAbortThreshold=10
CriticalAbortThreshold=3
LogSeverityLevels=Warning,Error,Critical

[RetryPolicy]
; Retry governance for transient failures
Enabled=1
MaxRetries=3
BackoffBaseMs=1000
BackoffMultiplier=2
MaxBackoffMs=8000
JitterEnabled=1

[FleetGovernance]
; Fleet-wide governance controls
Enabled=1
DirectoryCheckEnabled=1
WhitelistEnforcementEnabled=1
KPIExportEnabled=1
FleetSummaryEnabled=1

; ============================================================
; v10.0 CERTIFICATION-GRADE SECTIONS
; ============================================================

[ZeroTrust]
; Pre-execution trust chain validation
Enabled=1
; SHA256Only | AuthenticodeWithFallback | Authenticode
SignatureMode=SHA256Only
ApprovedFilesPath=Config\ApprovedFiles.json
AbortOnManifestMismatch=1
AbortOnConfigHashMismatch=1
AbortOnPolicyIntegrityFailure=1
AbortOnSignatureFailure=1
TrustedThumbprint=

[ResourceGovernance]
; Memory, CPU, disk I/O, handle monitoring during execution
Enabled=1
MemoryMaxPercent=85
CPUMaxPercent=95
CPUSpikeMaxDurationSec=30
DiskIOMaxMBps=500
HandleCountMax=10000
AbortStressOnBreach=1
MonitorIntervalMs=2000

[ConfigSchema]
; Config file schema validation before execution
Enabled=1
AbortOnInvalid=1
ValidateWeightSum=1
ValidateNumericRanges=1
RequiredSections=General,Paths,SmartDiagnosis,ClassificationEngine,GovernanceEngine,Diagnostics,HardwareTests,Repair,Security

[SecurityHardening]
; Read-only security posture check (no modifications)
Enabled=1
CheckExecutionPolicy=1
CheckSecureBoot=1
CheckDefenderTamperProtection=1
CheckBitLocker=1
AttachToFinalReport=1

[ForensicIntegrity]
; Post-session forensic archive with hash chain
Enabled=1
ChainHashEnabled=1
ArchiveReadOnly=1
IncludeSignatureThumbprint=1
ChainHashStorePath=Data\ChainHash.json

[KPIThresholds]
; Certification KPI enforcement thresholds
Enabled=1
AutoFixRateMin=70
RollbackSuccessRateMin=90
StressPassRateMin=80
ClassificationConfidenceAvgMin=60
FlagGovernanceWarning=1

[RegressionHarness]
; Simulated fault injection regression testing
Enabled=1
AccuracyThreshold=95
OutputPath=Reports
ScenarioCount=6

[AuditExport]
; External audit bundle generation
Enabled=1
BundleFormat=zip
IncludeLedger=1
IncludeTransactionHistory=1
IncludeSignatureLog=1
IncludeHashChain=1
IncludeKPIReport=1
IncludeVersionReport=1
IncludeRegressionReport=1
